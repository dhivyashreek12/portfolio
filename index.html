<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Java Projects</title>

<style>

body{

    margin:0;
    font-family:Poppins,sans-serif;

    background:
    linear-gradient(135deg,#050816,#0f172a,#111827);

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

/* Card */

.container{

    width:85%;
    max-width:900px;

    background:rgba(17,24,39,0.95);

    border-radius:30px;

    padding:40px;

    box-shadow:
    0 0 25px rgba(0,198,255,0.2),
    0 0 60px rgba(127,92,255,0.2);

    display:flex;
    gap:40px;
    align-items:center;
}

/* Left */

.image{

    flex:1;
}

.image img{

    width:100%;

    border-radius:20px;

    box-shadow:
    0 0 20px rgba(0,198,255,0.4);
}

/* Right */

.content{

    flex:1;
}

.content h1{

    font-size:55px;

    margin-bottom:15px;

    color:#00c6ff;

    text-shadow:
    0 0 15px #00c6ff;
}

.content p{

    color:#d1d5db;

    line-height:1.8;

    font-size:18px;
}

/* Buttons */

.buttons{

    margin-top:30px;

    display:flex;
    gap:20px;
}

a{

    text-decoration:none;
}

button{

    padding:15px 28px;

    border:none;

    border-radius:14px;

    font-size:17px;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(to right,#00c6ff,#7f5cff);

    box-shadow:
    0 0 15px rgba(0,198,255,0.5);

    transition:0.4s;
}

button:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 25px #00c6ff,
    0 0 50px #7f5cff;
}

</style>

</head>

<body>

<div class="container">

    <div class="image">

        <img src="https://cdn-icons-png.flaticon.com/512/226/226777.png">

    </div>

    <div class="content">

        <h1>Java Programs</h1>

        <p>

            Collection of Java programs including
            loops, arrays, strings, OOP concepts,
            patterns, and problem-solving programs.

        </p>

        <div class="buttons">

            <a href="https://github.com/dhivyashreek12/java-programs" target="_blank">

                <button>View Code</button>

            </a>

            <a href="index.html">

                <button>Back</button>

            </a>

        </div>

    </div>

</div>

</body>
</html>
